name: Build & Push Kaayaka Website + Update K8s Manifests

on:
  push:
    branches: ["main"]
    paths:
      - "**.jsx"
      - "**.js"
      - "**.css"
      - "**.html"
      - "Dockerfile"
      - "nginx.conf"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kaayaka-website:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kaayaka-website:latest

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k-apps repo
        uses: actions/checkout@v4
        with:
          repository: NaveenSasalu/k-apps
          token: ${{ secrets.K_APPS_TOKEN }}

      - name: Update image tag in deployment manifest
        run: sed -i "s#kaayaka-website:.*#kaayaka-website:${{ github.sha }}#g" m-site/deploy.yaml

      - name: Commit updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: "m-site/deploy.yaml"
          message: "ci: update kaayaka-website image to ${{ github.sha }}"
