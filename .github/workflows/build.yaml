name: Build and Push to DockerHub

on:
  push:
    branches: ["main"]
    paths:
      - "**.jsx"
      - "**.js"
      - "**.html"
      - "Dockerfile"
      - "nginx.conf"
      - "package.json"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kaayaka-website:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kaayaka-website:latest
